<!DOCTYPE html>
<html lang="en">
<head>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>AI-Based Student Performance Prediction</h1>

    <button onclick="predictGrade()">Predict</button>

    <input id="prompt" placeholder="Ask anything">

<button onclick="sendMessage()">
Send
</button>

<p id="response"></p>
